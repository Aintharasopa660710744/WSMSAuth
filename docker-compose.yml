# docker-compose.yml  (for local dev)
version: "3.9"

services:
  auth-service:
    build: .
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      GIN_MODE: "debug"
      DATABASE_DSN: "postgres://postgres:password@postgres:5432/authdb?sslmode=disable"
      JWT_ACCESS_SECRET: "dev-access-secret-change-me"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me"
      JWT_ACCESS_EXPIRY_MINUTES: "15"
      JWT_REFRESH_EXPIRY_DAYS: "7"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/001_create_users.sql:/docker-entrypoint-initdb.d/001_create_users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
